<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>精神状态色彩测试</title>
    <style>
        :root {
            --bg-page: #eceff3;
            --bg-card: #ffffff;
            --bg-soft: #f5f7fa;
            --bg-soft-2: #eef1f5;
            --text-main: #16181d;
            --text-muted: #6b7280;
            --text-light: #f8fafc;
            --line: #e5e7eb;
            --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.12);
            --shadow-md: 0 14px 30px rgba(15, 23, 42, 0.08);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --container-width: 430px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 35%),
                radial-gradient(circle at bottom right, rgba(203, 213, 225, 0.7), transparent 30%),
                linear-gradient(160deg, #f6f7fb 0%, #e8edf3 100%);
            -webkit-tap-highlight-color: transparent;
        }

        button {
            font: inherit;
            border: 0;
            cursor: pointer;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-shell {
            width: 100%;
            max-width: var(--container-width);
            min-height: 100vh;
            background: var(--bg-card);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex: 1;
        }

        .screen.active {
            display: flex;
        }

        .screen-home {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
            background: linear-gradient(145deg, #f9fafb 0%, #e5e7eb 100%);
        }

        .hero-orb {
            width: 96px;
            height: 96px;
            margin-bottom: 24px;
            border-radius: 999px;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 45%, #4f46e5 100%);
            box-shadow: 0 18px 34px rgba(139, 92, 246, 0.28);
            animation: pulse 2s infinite ease-in-out;
        }

        h1, h2, p {
            margin: 0;
        }

        .home-title {
            font-size: 32px;
            line-height: 1.15;
            font-weight: 900;
            letter-spacing: -0.04em;
            margin-bottom: 10px;
        }

        .home-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .primary-btn,
        .secondary-btn,
        .option-btn {
            width: 100%;
            border-radius: var(--radius-lg);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
        }

        .primary-btn {
            background: #111111;
            color: #ffffff;
            padding: 18px 20px;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.18);
        }

        .primary-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.18);
        }

        .screen-quiz {
            flex-direction: column;
            padding: 24px;
        }

        .progress-wrap {
            margin: 10px 0 28px;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f1f5f9;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0;
            height: 100%;
            background: #111111;
            border-radius: 999px;
            transition: width 0.3s ease-out;
        }

        .question-title {
            font-size: 20px;
            font-weight: 800;
            line-height: 1.55;
            margin-bottom: 28px;
        }

        .options {
            display: grid;
            gap: 14px;
        }

        .option-btn {
            text-align: left;
            padding: 18px;
            background: #ffffff;
            border: 2px solid #f1f5f9;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.05);
        }

        .option-btn:hover {
            border-color: #111827;
            transform: translateY(-1px);
        }

        .option-btn:active {
            transform: scale(0.985);
        }

        .option-label {
            display: block;
            color: #374151;
            font-size: 15px;
            line-height: 1.6;
            font-weight: 500;
        }

        .screen-loading {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            background: #000000;
            color: #ffffff;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(107, 114, 128, 0.45);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 24px;
        }

        .loading-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .loading-text {
            color: #9ca3af;
            font-size: 14px;
            font-family: ui-monospace, SFMono-Regular, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .screen-result {
            flex-direction: column;
            background: #f3f4f6;
        }

        .result-scroll {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .result-scroll::-webkit-scrollbar {
            display: none;
        }

        .capture-area {
            background: #ffffff;
            padding: 24px 24px 32px;
            min-height: max-content;
        }

        .eyebrow {
            padding-top: 10px;
            text-align: center;
            margin-bottom: 24px;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .result-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 30px;
            margin-bottom: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            box-shadow: inset 0 2px 20px rgba(255, 255, 255, 0.08), 0 24px 45px rgba(15, 23, 42, 0.12);
        }

        .result-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            display: none;
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            backdrop-filter: blur(12px);
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .result-badge.visible {
            display: inline-flex;
        }

        .result-name {
            font-size: 42px;
            line-height: 1.05;
            font-weight: 900;
            margin-bottom: 6px;
            letter-spacing: -0.05em;
            text-shadow: 0 6px 14px rgba(15, 23, 42, 0.16);
        }

        .result-state {
            font-size: 20px;
            font-weight: 600;
            opacity: 0.9;
            text-shadow: 0 6px 14px rgba(15, 23, 42, 0.16);
        }

        .result-info {
            display: grid;
            gap: 14px;
        }

        .result-desc {
            background: #f8fafc;
            border: 1px solid #eef2f7;
            border-radius: var(--radius-md);
            padding: 16px;
            color: #4b5563;
            font-size: 14px;
            line-height: 1.75;
        }

        .result-desc strong {
            color: #111111;
            margin-right: 8px;
        }

        .tips-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .tip-card {
            border-radius: var(--radius-md);
            padding: 14px;
            border: 1px solid transparent;
        }

        .tip-card.do {
            background: rgba(34, 197, 94, 0.08);
            border-color: rgba(34, 197, 94, 0.18);
        }

        .tip-card.dont {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.16);
        }

        .tip-label {
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .tip-card.do .tip-label {
            color: #15803d;
        }

        .tip-card.dont .tip-label {
            color: #b91c1c;
        }

        .tip-value {
            color: #4b5563;
            font-size: 13px;
            line-height: 1.6;
        }

        .capture-footer {
            margin-top: 30px;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
            opacity: 0.55;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            letter-spacing: 0.1em;
        }

        .action-bar {
            position: sticky;
            bottom: 0;
            padding: 20px 24px 24px;
            background: rgba(255, 255, 255, 0.98);
            border-top: 1px solid #f1f5f9;
            box-shadow: 0 -10px 24px rgba(15, 23, 42, 0.04);
            backdrop-filter: blur(12px);
        }

        .secondary-btn {
            padding: 14px 18px;
            background: #f3f4f6;
            color: #4b5563;
            font-size: 14px;
            font-weight: 600;
        }

        .secondary-btn:hover {
            background: #e5e7eb;
        }

        .btn-stack {
            display: grid;
            gap: 12px;
        }

        .btn-content {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .download-icon {
            width: 18px;
            height: 18px;
            position: relative;
            display: inline-block;
        }

        .download-icon::before,
        .download-icon::after {
            content: "";
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: currentColor;
        }

        .download-icon::before {
            width: 2px;
            height: 12px;
            top: 0;
            border-radius: 999px;
        }

        .download-icon::after {
            width: 10px;
            height: 10px;
            bottom: 0;
            clip-path: polygon(50% 100%, 0 35%, 28% 35%, 28% 0, 72% 0, 72% 35%, 100% 35%);
        }

        .toast {
            position: absolute;
            left: 50%;
            bottom: 96px;
            transform: translate(-50%, 20px);
            padding: 12px 20px;
            border-radius: 999px;
            background: rgba(17, 24, 39, 0.86);
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            white-space: nowrap;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
        }

        .toast.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .glitch-bg {
            background: #000000 !important;
        }

        .glitch-bg::before,
        .glitch-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .glitch-bg::before {
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255, 0, 255, 0.2) 10px,
                rgba(255, 0, 255, 0.2) 20px
            );
            mix-blend-mode: color-dodge;
            animation: glitch-anim 0.3s infinite alternate-reverse;
        }

        .glitch-bg::after {
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 15px,
                rgba(0, 255, 255, 0.18) 15px,
                rgba(0, 255, 255, 0.18) 30px
            );
            animation: glitch-anim-2 0.4s infinite alternate;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.04); opacity: 0.88; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes glitch-anim {
            0% { transform: translate(2px, 2px); opacity: 0.8; }
            100% { transform: translate(-2px, -2px); opacity: 0.5; }
        }

        @keyframes glitch-anim-2 {
            0% { transform: translate(-3px, 1px); opacity: 0.6; }
            100% { transform: translate(3px, -1px); opacity: 0.9; }
        }

        @media (min-width: 640px) {
            .app-shell {
                min-height: 800px;
                border-radius: 34px;
                box-shadow: var(--shadow-lg);
            }
        }

        @media (max-width: 420px) {
            .page {
                padding: 0;
            }

            .app-shell {
                max-width: none;
            }

            .question-title {
                font-size: 20px;
            }

            .result-name {
                font-size: 36px;
            }

            .tips-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div id="app" class="app-shell">
            <section id="screen-home" class="screen screen-home active">
                <div class="hero-orb"></div>
                <h1 class="home-title">精神状态色彩测试</h1>
                <p class="home-subtitle">测一测你这具皮囊下，藏着什么颜色的疯批灵魂。</p>
                <button id="start-btn" class="primary-btn">开始心智扫描</button>
            </section>

            <section id="screen-quiz" class="screen screen-quiz">
                <div class="progress-wrap">
                    <div class="progress-meta">
                        <span>SCANNED</span>
                        <span id="progress-text">1 / 19</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>

                <div>
                    <h2 id="question-title" class="question-title"></h2>
                    <div id="options" class="options"></div>
                </div>
            </section>

            <section id="screen-loading" class="screen screen-loading">
                <div class="spinner"></div>
                <h2 class="loading-title">正在解析潜意识底色...</h2>
                <p id="loading-text" class="loading-text">Extracting...</p>
            </section>

            <section id="screen-result" class="screen screen-result">
                <div class="result-scroll">
                    <div id="capture-area" class="capture-area">
                        <div class="eyebrow">Your True Color</div>

                        <div id="result-card" class="result-card">
                            <div id="result-badge" class="result-badge">SSR 隐藏款</div>
                            <h1 id="result-name" class="result-name"></h1>
                            <p id="result-state" class="result-state"></p>
                        </div>

                        <div class="result-info">
                            <div class="result-desc">
                                <strong>临床表现:</strong><span id="result-desc"></span>
                            </div>

                            <div class="tips-grid">
                                <div class="tip-card do">
                                    <div class="tip-label">宜</div>
                                    <div id="result-do" class="tip-value"></div>
                                </div>
                                <div class="tip-card dont">
                                    <div class="tip-label">忌</div>
                                    <div id="result-dont" class="tip-value"></div>
                                </div>
                            </div>
                        </div>

                        <div class="capture-footer">
                            <span>MENTAL COLOR TEST</span>
                            <span>SCAN TO TEST -&gt;</span>
                        </div>
                    </div>
                </div>

                <div class="action-bar">
                    <div class="btn-stack">
                        <button id="save-btn" class="primary-btn">
                            <span class="btn-content">
                                <span class="download-icon" aria-hidden="true"></span>
                                <span id="save-btn-text">保存专属色卡</span>
                            </span>
                        </button>
                        <button id="reset-btn" class="secondary-btn">重新测试</button>
                    </div>
                </div>
            </section>

            <div id="toast" class="toast"></div>
        </div>
    </div>

            elements.resultName.style.color = textColor;
            elements.resultState.style.color = textColor;

            if (isSSR) {
                elements.resultCard.classList.add("glitch-bg");
            }
        }

        function renderResult() {
            const resultData = getResultData();
            applyResultCardStyle(resultData, Boolean(resultData.isSSR));
            elements.resultBadge.classList.toggle("visible", Boolean(resultData.isSSR));
            elements.resultName.textContent = resultData.name;
            elements.resultState.textContent = resultData.state;
            elements.resultDesc.textContent = resultData.desc;
            elements.resultDo.textContent = resultData.do;
            elements.resultDont.textContent = resultData.dont;
        }

        function calculateResult() {
            state.appState = 2;
            showScreen("loading");

            const texts = ["Loading Void...", "Bypassing Shield...", "Analyzing Chaos...", "Done."];
            let textIndex = 0;
            elements.loadingText.textContent = texts[0];

            const timer = setInterval(() => {
                textIndex += 1;
                elements.loadingText.textContent = texts[Math.min(textIndex, texts.length - 1)];
                if (textIndex >= texts.length - 1) {
                    clearInterval(timer);
                    determineColor();
                    renderResult();
                    setTimeout(() => {
                        state.appState = 3;
                        showScreen("result");
                    }, 500);
                }
            }, 600);
        }

        function resetTest() {
            state.appState = 0;
            showScreen("home");
        }

        function createGradient(ctx, fill, width, height) {
            if (typeof fill !== "string" || (!fill.startsWith("linear-gradient") && !fill.startsWith("radial-gradient") && !fill.startsWith("repeating-linear-gradient"))) {
                return fill;
            }

            const matches = fill.match(/#(?:[0-9a-fA-F]{3,8})/g);
            const colors = matches && matches.length ? matches : ["#111111", "#333333"];
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            const step = colors.length === 1 ? 1 : 1 / (colors.length - 1);
            colors.forEach((color, index) => gradient.addColorStop(step * index, color));
            return gradient;
        }

        function wrapText(ctx, text, maxWidth) {
            const chars = Array.from(text);
            const lines = [];
            let currentLine = "";

            chars.forEach((char) => {
                const testLine = currentLine + char;
                if (ctx.measureText(testLine).width > maxWidth && currentLine) {
                    lines.push(currentLine);
                    currentLine = char;
                } else {
                    currentLine = testLine;
                }
            });

            if (currentLine) {
                lines.push(currentLine);
            }
            return lines;
        }

        function drawRoundedRect(ctx, x, y, width, height, radius, fillStyle, strokeStyle, lineWidth) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();

            if (fillStyle) {
                ctx.fillStyle = fillStyle;
                ctx.fill();
            }

            if (strokeStyle && lineWidth) {
                ctx.strokeStyle = strokeStyle;
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }
        }

        async function saveImage() {
            if (state.isSaving) {
                return;
            }

            state.isSaving = true;
            elements.saveBtnText.textContent = "生成色卡中...";

            try {
                const resultData = getResultData();
                const canvas = document.createElement("canvas");
                canvas.width = 1080;
                canvas.height = 1600;
                const ctx = canvas.getContext("2d");

                ctx.fillStyle = "#f3f4f6";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                drawRoundedRect(ctx, 60, 60, 960, 1480, 42, "#ffffff");

                ctx.fillStyle = "#9ca3af";
                ctx.font = "700 28px Arial, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("YOUR TRUE COLOR", 540, 130);

                const cardFill = createGradient(ctx, resultData.background || "#111111", 840, 840);
                drawRoundedRect(ctx, 120, 180, 840, 840, 46, cardFill, resultData.border ? resultData.border : null, resultData.border ? 8 : 0);

                if (resultData.isSSR) {
                    ctx.save();
                    ctx.globalAlpha = 0.18;
                    for (let i = -840; i < 840; i += 40) {
                        ctx.fillStyle = "#ff00ff";
                        ctx.fillRect(120 + i, 180, 16, 840);
                    }
                    ctx.restore();

                    drawRoundedRect(ctx, 700, 220, 180, 54, 26, "rgba(255,255,255,0.18)", "rgba(255,255,255,0.28)", 2);
                    ctx.fillStyle = "#ffffff";
                    ctx.font = "900 22px Arial, sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText("SSR 隐藏款", 790, 255);
                }

                ctx.fillStyle = resultData.textColor || "#ffffff";
                ctx.textAlign = "left";
                ctx.font = "900 76px Arial, sans-serif";
                ctx.fillText(resultData.name, 170, 880);
                ctx.font = "600 40px Arial, sans-serif";
                ctx.globalAlpha = 0.92;
                ctx.fillText(resultData.state, 170, 940);
                ctx.globalAlpha = 1;

                drawRoundedRect(ctx, 120, 1070, 840, 170, 28, "#f8fafc", "#eef2f7", 2);
                ctx.fillStyle = "#111111";
                ctx.font = "700 28px Arial, sans-serif";
                ctx.fillText("临床表现:", 160, 1128);
                ctx.fillStyle = "#4b5563";
                ctx.font = "28px Arial, sans-serif";
                wrapText(ctx, resultData.desc, 760).slice(0, 4).forEach((line, index) => {
                    ctx.fillText(line, 160, 1172 + index * 36);
                });

                drawRoundedRect(ctx, 120, 1270, 405, 160, 28, "rgba(34, 197, 94, 0.08)", "rgba(34, 197, 94, 0.16)", 2);
                drawRoundedRect(ctx, 555, 1270, 405, 160, 28, "rgba(239, 68, 68, 0.08)", "rgba(239, 68, 68, 0.16)", 2);

                ctx.fillStyle = "#15803d";
                ctx.font = "800 24px Arial, sans-serif";
                ctx.fillText("宜", 160, 1320);
                ctx.fillStyle = "#4b5563";
                ctx.font = "28px Arial, sans-serif";
                wrapText(ctx, resultData.do, 320).slice(0, 3).forEach((line, index) => {
                    ctx.fillText(line, 160, 1370 + index * 34);
                });

                ctx.fillStyle = "#b91c1c";
                ctx.font = "800 24px Arial, sans-serif";
                ctx.fillText("忌", 595, 1320);
                ctx.fillStyle = "#4b5563";
                ctx.font = "28px Arial, sans-serif";
                wrapText(ctx, resultData.dont, 320).slice(0, 3).forEach((line, index) => {
                    ctx.fillText(line, 595, 1370 + index * 34);
                });

                ctx.strokeStyle = "#eef2f7";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(120, 1475);
                ctx.lineTo(960, 1475);
                ctx.stroke();

                ctx.fillStyle = "rgba(75, 85, 99, 0.7)";
                ctx.font = "22px monospace";
                ctx.fillText("MENTAL COLOR TEST", 120, 1515);
                ctx.textAlign = "right";
                ctx.fillText("SCAN TO TEST ->", 960, 1515);

                const link = document.createElement("a");
                link.download = "精神色卡-" + resultData.name + ".png";
                link.href = canvas.toDataURL("image/png");
                link.click();
                showToast("色卡生成成功，快去分享吧。");
            } catch (error) {
                console.error("生成截图失败", error);
                showToast("截图失败了，请稍后再试。");
            } finally {
                state.isSaving = false;
                elements.saveBtnText.textContent = "保存专属色卡";
            }
        }

        elements.startBtn.addEventListener("click", startTest);
        elements.resetBtn.addEventListener("click", resetTest);
        elements.saveBtn.addEventListener("click", saveImage);
    </script>
</body>
</html>
